<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Lock System</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #1c1c1e; color: white; text-align: center; padding: 40px 20px; }
        .card { background: #2c2c2e; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-top: 30px; }
        h2 { margin-bottom: 10px; color: #34c759; }
        p { color: #aeaeb2; font-size: 14px; line-height: 1.5; }
        .btn { background-color: #34c759; color: white; padding: 15px 40px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; transition: background 0.2s; }
        .btn:active { background-color: #248a3d; }
        .loader { display: none; border: 4px solid #3a3a3c; border-top: 4px solid #34c759; border-radius: 50%; width: 35px; height: 35px; animation: spin 0.8s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔒 Device Hardware Lock</h2>
        <p>To secure your payouts and verify this device profile, click the lock authorization button below.</p>
        
        <button class="btn" id="lockBtn" onclick="processHardwareID()">Lock This Device</button>
        <div class="loader" id="loader"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function processHardwareID() {
            document.getElementById('lockBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // Extract deeply embedded device traits clone apps fail to mock
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debugInfo = gl ? gl.getExtension('WEBGL_debug_renderer_info') : null;
            const gpu = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "NoGPU";

            const coreSignature = [
                navigator.userAgent,
                screen.width + "x" + screen.height,
                navigator.hardwareConcurrency || "0",
                gpu,
                navigator.deviceMemory || "0"
            ].join('||');

            // Generate a secure numerical checksum layout hash
            let finalHash = 0;
            for (let i = 0; i < coreSignature.length; i++) {
                finalHash = (finalHash << 5) - finalHash + coreSignature.charCodeAt(i);
                finalHash |= 0;
            }

            // Extract the user parameters from the browser location string
            const params = new URLSearchParams(window.location.search);
            const tgId = params.get('id');
            const botId = params.get('bot');

            // Push payload data package straight back to your Bots.Business Webhook
            const webhookUrl = `https://bots.business{botId}/webhook?command=onDeviceVerifyCallback&tg_id=${tgId}&hardware_id=${Math.abs(finalHash)}`;

            fetch(webhookUrl)
            .then(() => {
                setTimeout(() => { tg.close(); }, 800);
            })
            .catch(() => {
                alert("Network error, please try again.");
                document.getElementById('lockBtn').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            });
        }
    </script>
</body>
</html>
